apiVersion: apps/v1
kind: Deployment
metadata:
  name: gradience-indexer
  labels:
    app: gradience-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gradience-indexer
  template:
    metadata:
      labels:
        app: gradience-indexer
    spec:
      containers:
        - name: indexer
          image: gradience/indexer:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gradience-secrets
                  key: database-url
            - name: RPC_URL
              value: "https://api.devnet.solana.com"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gradience-indexer
spec:
  selector:
    app: gradience-indexer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gradience-indexer
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: indexer.gradience.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gradience-indexer
                port:
                  number: 80
