# Gradience Production — All backend services
#
# Web frontends are on Vercel (agentm-web, etc.)
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build

services:
    # -- Indexer PostgreSQL (chain data)
    indexer-db:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: gradience_chain_hub
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - indexer-pgdata:/var/lib/postgresql/data
            - ../apps/chain-hub/indexer-service/migrations:/docker-entrypoint-initdb.d
        networks:
            - backend
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d gradience_chain_hub']
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    # -- Unified Gradience Indexer (Solana + Agent Arena on-chain data)
    indexer:
        build:
            context: ../apps/chain-hub/indexer-service
            dockerfile: Dockerfile
        image: gradience/chain-hub-indexer:latest
        restart: unless-stopped
        environment:
            DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@indexer-db:5432/gradience_chain_hub
            INDEXER_BIND_ADDR: 0.0.0.0:8788
            SOLANA_WS_URL: ${SOLANA_WS_URL:-wss://api.devnet.solana.com}
            SOLANA_PROGRAM_ID: ${SOLANA_PROGRAM_ID:-11111111111111111111111111111111}
            ARENA_PROGRAM_ID: ${ARENA_PROGRAM_ID:-11111111111111111111111111111111}
            ARENA_POLL_INTERVAL_MS: ${ARENA_POLL_INTERVAL_MS:-30000}
            SOLANA_COMMITMENT: ${SOLANA_COMMITMENT:-confirmed}
            SOLANA_SUBSCRIBE: 'true'
        depends_on:
            indexer-db:
                condition: service_healthy
        networks:
            - backend
        # Exposed on localhost for direct debugging; nginx proxies via Docker network
        ports:
            - '127.0.0.1:3001:8788'

    # -- Nginx (reverse proxy)
    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./nginx-api.conf:/etc/nginx/conf.d/default.conf:ro
            - ./ssl:/etc/nginx/ssl:ro
            - certbot-data:/etc/letsencrypt:ro
            - certbot-www:/var/www/certbot:ro
        networks:
            - backend
        depends_on:
            - indexer

    # -- Certbot (SSL certificate renewal)
    certbot:
        image: certbot/certbot
        restart: 'no'
        entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
        volumes:
            - certbot-data:/etc/letsencrypt
            - certbot-www:/var/www/certbot
        networks:
            - backend

volumes:
    indexer-pgdata:
        driver: local
    certbot-data:
        driver: local
    certbot-www:
        driver: local

networks:
    backend:
        driver: bridge
