# Gradience Production -- All backend services
#
# Web frontends are on Vercel (agentm-web, etc.)
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build

services:

  # -- Indexer PostgreSQL (chain data)
  indexer-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gradience_indexer
      POSTGRES_USER: ${POSTGRES_USER:-gradience}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gradience}
    volumes:
      - indexer-pgdata:/var/lib/postgresql/data
      - ../apps/chain-hub/indexer/migrations:/docker-entrypoint-initdb.d
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradience} -d gradience_indexer"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # -- Indexer Redis (cache)
  indexer-cache:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -- Chain Hub Indexer (Solana on-chain data)
  indexer:
    image: gradience/indexer:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gradience}:${POSTGRES_PASSWORD:-gradience}@indexer-db:5432/gradience_indexer
      REDIS_URL: redis://indexer-cache:6379
      INDEXER_BIND_ADDR: 0.0.0.0:3001
    depends_on:
      indexer-db:
        condition: service_healthy
      indexer-cache:
        condition: service_healthy
    networks:
      - backend
    ports:
      - "0.0.0.0:3001:3001"

  # -- Daemon PostgreSQL (session/social data)
  daemon-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gradience
      POSTGRES_USER: ${POSTGRES_USER:-gradience}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gradience}
    volumes:
      - daemon-pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradience} -d gradience"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # -- Agent Daemon (Fastify + SQLite + A2A Router)
  agent-daemon:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent-daemon
    image: gradience/agent-daemon:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AGENTD_HOST: "0.0.0.0"
      AGENTD_PORT: "4001"
      AGENTD_LOG_LEVEL: ${AGENTD_LOG_LEVEL:-info}
      AGENTD_DB_PATH: /data/agentd.db
      AGENTD_ALLOW_ALL_INTERFACES: "true"
      AGENTD_A2A_ENABLED: "true"
      AGENTD_SOLANA_RPC_URL: ${SOLANA_RPC_ENDPOINT:-https://api.devnet.solana.com}
    depends_on:
      daemon-db:
        condition: service_healthy
    volumes:
      - daemon-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "0.0.0.0:4001:4001"

volumes:
  indexer-pgdata:
    driver: local
  daemon-pgdata:
    driver: local
  daemon-data:
    driver: local

networks:
  backend:
    driver: bridge
