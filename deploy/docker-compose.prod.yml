# Gradience Production — All backend services
#
# Web frontends are on Vercel (agentm-web, etc.)
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build

services:
    # -- Indexer PostgreSQL (chain data)
    indexer-db:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: gradience_indexer
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - indexer-pgdata:/var/lib/postgresql/data
            - ../apps/agent-arena/indexer/migrations:/docker-entrypoint-initdb.d
        networks:
            - backend
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d gradience_indexer']
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    # -- Indexer Redis (cache)
    indexer-cache:
        image: redis:7-alpine
        restart: unless-stopped
        networks:
            - backend
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5

    # -- Unified Gradience Indexer (Solana on-chain data)
    indexer:
        build:
            context: ../apps/agent-arena/indexer
            dockerfile: Dockerfile
        image: gradience/indexer:latest
        restart: unless-stopped
        environment:
            DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@indexer-db:5432/gradience_indexer
            REDIS_URL: redis://indexer-cache:6379
            INDEXER_BIND_ADDR: 0.0.0.0:3001
        depends_on:
            indexer-db:
                condition: service_healthy
            indexer-cache:
                condition: service_healthy
        networks:
            - backend
        ports:
            - '0.0.0.0:3001:3001'

    # -- Nginx (reverse proxy)
    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./nginx-api.conf:/etc/nginx/conf.d/default.conf:ro
            - ./ssl:/etc/nginx/ssl:ro
            - certbot-data:/etc/letsencrypt:ro
            - certbot-www:/var/www/certbot:ro
        networks:
            - backend
        depends_on:
            - indexer

    # -- Certbot (SSL certificate renewal)
    certbot:
        image: certbot/certbot
        restart: 'no'
        entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
        volumes:
            - certbot-data:/etc/letsencrypt
            - certbot-www:/var/www/certbot
        networks:
            - backend

volumes:
    indexer-pgdata:
        driver: local
    certbot-data:
        driver: local
    certbot-www:
        driver: local

networks:
    backend:
        driver: bridge
