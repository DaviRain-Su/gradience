# Gradience Production — Core Backend Services Only
#
# Web frontends (agentm-web, agentm-pro, website, docs) are deployed separately
# (Vercel / Cloudflare Pages / static hosting).
#
# Usage:
#   cd /opt/gradience
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build

services:

  # -- PostgreSQL 16 (Chain Hub Indexer data)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gradience_indexer
      POSTGRES_USER: ${POSTGRES_USER:-gradience}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gradience}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../apps/chain-hub/indexer/migrations:/docker-entrypoint-initdb.d
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradience} -d gradience_indexer"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # -- agent-daemon (Fastify + SQLite + A2A Router)
  agent-daemon:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent-daemon
    image: gradience/agent-daemon:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AGENTD_HOST: "0.0.0.0"
      AGENTD_PORT: "4001"
      AGENTD_LOG_LEVEL: ${AGENTD_LOG_LEVEL:-info}
      AGENTD_DB_PATH: /data/agentd.db
      AGENTD_ALLOW_ALL_INTERFACES: "true"
      AGENTD_A2A_ENABLED: "true"
      AGENTD_SOLANA_RPC_URL: ${SOLANA_RPC_ENDPOINT:-https://api.devnet.solana.com}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - agent-daemon-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "0.0.0.0:4001:4001"

volumes:
  postgres-data:
    driver: local
  agent-daemon-data:
    driver: local

networks:
  backend:
    driver: bridge
