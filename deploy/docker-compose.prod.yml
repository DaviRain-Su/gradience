# ─────────────────────────────────────────────────────────────────────────────
# Gradience — Production Docker Compose (DigitalOcean)
#
# Services deployed:
#   postgres        — PostgreSQL 16 (for real indexer, future use)
#   indexer-mock    — Node.js mock indexer on port 3001 (initial backend)
#   agent-daemon    — Fastify daemon on port 4001
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d
#
# Build context must be the repo root:
#   cd /opt/gradience && docker compose -f deploy/docker-compose.prod.yml ...
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  # Reserved for the real Rust indexer. indexer-mock doesn't use it, but it's
  # provisioned now so data is durable when you swap in the real indexer.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gradience
      POSTGRES_USER: ${POSTGRES_USER:-gradience}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # required — no default in prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Run all migrations on first start
      - ../apps/agent-arena/indexer/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradience} -d gradience"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── indexer-mock ─────────────────────────────────────────────────────────────
  # Hono + WebSocket mock; swap for the real Rust indexer when ready.
  indexer-mock:
    build:
      context: ..
      dockerfile: docker/Dockerfile.indexer-mock
    image: gradience/indexer-mock:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      SOLANA_RPC_ENDPOINT: ${SOLANA_RPC_ENDPOINT:-https://api.devnet.solana.com}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Not exposed directly — nginx proxies api.gradiences.xyz → this service
    expose:
      - "3001"

  # ── agent-daemon ──────────────────────────────────────────────────────────────
  # Fastify + SQLite daemon; SQLite file persisted in named volume.
  agent-daemon:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent-daemon
    image: gradience/agent-daemon:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AGENTD_HOST: "0.0.0.0"
      AGENTD_PORT: "4001"
      AGENTD_LOG_LEVEL: ${AGENTD_LOG_LEVEL:-info}
      AGENTD_DB_PATH: /data/agentd.db
      AGENTD_CHAIN_HUB_URL: ${AGENTD_CHAIN_HUB_URL:-}
    volumes:
      - agent-daemon-data:/data
    networks:
      - backend
    depends_on:
      indexer-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    expose:
      - "4001"

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  agent-daemon-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
