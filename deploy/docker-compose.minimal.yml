# Gradience Minimal Production Docker Compose
# 精简部署 - 只运行核心后端服务
# 前端应用建议使用 Vercel 托管
#
# Usage:
#   docker compose -f deploy/docker-compose.minimal.yml --env-file deploy/.env.prod up -d

services:
  # -- PostgreSQL 16 (Chain Hub data)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gradience
      POSTGRES_USER: ${POSTGRES_USER:-gradience}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradience} -d gradience"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M

  # -- agent-daemon (Fastify + SQLite, Agent runtime backend)
  agent-daemon:
    build:
      context: ../agent-daemon
      dockerfile: ../docker/Dockerfile.agent-daemon-standalone
    image: gradience/agent-daemon:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AGENTD_HOST: "0.0.0.0"
      AGENTD_PORT: "4001"
      AGENTD_LOG_LEVEL: ${AGENTD_LOG_LEVEL:-info}
      AGENTD_DB_PATH: /data/agentd.db
      AGENTD_ALLOW_ALL_INTERFACES: "true"
      AGENTD_CHAIN_HUB_URL: ${AGENTD_CHAIN_HUB_URL:-}
      SOLANA_RPC_ENDPOINT: ${SOLANA_RPC_ENDPOINT:-https://api.devnet.solana.com}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - agent-daemon-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "127.0.0.1:4001:4001"
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres-data:
    driver: local
  agent-daemon-data:
    driver: local

networks:
  backend:
    driver: bridge
