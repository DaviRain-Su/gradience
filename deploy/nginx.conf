# Nginx reverse proxy for Gradience services
#
# Architecture v2 -- Five-Layer Stack:
#   Discovery via Nostr (decentralized, no proxy needed)
#   Communication via XMTP (decentralized, no proxy needed)
#   This nginx proxies user-facing services only.
#
# Subdomains:
#   gradiences.xyz / www  -> website:3003
#   app.gradiences.xyz    -> agentm-web:5200
#   pro.gradiences.xyz    -> agentm-pro:5300
#   docs.gradiences.xyz   -> developer-docs:3000
#   api.gradiences.xyz    -> agent-daemon:4001

upstream agent_daemon {
    server 127.0.0.1:4001;
    keepalive 32;
}

upstream agentm_web {
    server 127.0.0.1:5200;
    keepalive 32;
}

upstream agentm_pro {
    server 127.0.0.1:5300;
    keepalive 32;
}

upstream developer_docs {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream website {
    server 127.0.0.1:3003;
    keepalive 32;
}

# -- HTTP: serve ACME challenge, redirect everything else to HTTPS
server {
    listen 80;
    server_name gradiences.xyz www.gradiences.xyz app.gradiences.xyz pro.gradiences.xyz docs.gradiences.xyz api.gradiences.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -- gradiences.xyz / www -> website
server {
    listen 443 ssl;
    server_name gradiences.xyz www.gradiences.xyz;

    ssl_certificate     /etc/letsencrypt/live/gradiences.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gradiences.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;

    location / {
        proxy_pass         http://website;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# -- app.gradiences.xyz -> agentm-web
server {
    listen 443 ssl;
    server_name app.gradiences.xyz;

    ssl_certificate     /etc/letsencrypt/live/app.gradiences.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.gradiences.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;

    location / {
        proxy_pass         http://agentm_web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

