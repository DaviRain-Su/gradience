# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy for Gradience backend services
#
# Managed by certbot — DO NOT manually edit the ssl_certificate / ssl_dhparam
# blocks; certbot will overwrite them.
#
# Upstreams (Docker internal):
#   api.gradiences.xyz     → indexer-mock:3001
#   daemon.gradiences.xyz  → agent-daemon:4001
# ─────────────────────────────────────────────────────────────────────────────

# Upstreams use Docker service names resolved by the backend network
upstream indexer_mock {
    server indexer-mock:3001;
    keepalive 32;
}

upstream agent_daemon {
    server agent-daemon:4001;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.gradiences.xyz daemon.gradiences.xyz;

    # Let certbot serve its ACME challenge over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── api.gradiences.xyz → indexer-mock:3001 ───────────────────────────────────
server {
    listen 443 ssl;
    server_name api.gradiences.xyz;

    ssl_certificate     /etc/letsencrypt/live/api.gradiences.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gradiences.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header X-Frame-Options           DENY                                           always;
    add_header X-XSS-Protection          "1; mode=block"                                always;

    # CORS — adjust origins as needed
    add_header Access-Control-Allow-Origin  "*"                         always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"        always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    location / {
        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass         http://indexer_mock;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        client_max_body_size 4m;
    }
}

# ── daemon.gradiences.xyz → agent-daemon:4001 ────────────────────────────────
server {
    listen 443 ssl;
    server_name daemon.gradiences.xyz;

    ssl_certificate     /etc/letsencrypt/live/daemon.gradiences.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daemon.gradiences.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header X-Frame-Options           DENY                                           always;
    add_header X-XSS-Protection          "1; mode=block"                                always;

    location / {
        proxy_pass         http://agent_daemon;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        client_max_body_size 4m;
    }
}
