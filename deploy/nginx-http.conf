# Nginx reverse proxy for Gradience services - HTTP only (for initial certbot setup)
#
# Usage: certbot --nginx -d gradiences.xyz -d www.gradiences.xyz -d app.gradiences.xyz -d pro.gradiences.xyz -d docs.gradiences.xyz -d api.gradiences.xyz

upstream agent_daemon {
    server 127.0.0.1:4001;
    keepalive 32;
}

# -- HTTP: serve ACME challenge and proxy to services
server {
    listen 80;
    server_name gradiences.xyz www.gradiences.xyz app.gradiences.xyz pro.gradiences.xyz docs.gradiences.xyz api.gradiences.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy to agent-daemon API
    location / {
        proxy_pass         http://agent_daemon;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
