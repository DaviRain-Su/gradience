# Nginx reverse proxy for Gradience API
# SSL certificate managed by certbot

upstream agent_daemon {
    server 127.0.0.1:4001;
    keepalive 32;
}

# -- HTTP: redirect to HTTPS
server {
    listen 80;
    server_name api.gradiences.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -- HTTPS: api.gradiences.xyz -> agent-daemon
server {
    listen 443 ssl;
    server_name api.gradiences.xyz;

    ssl_certificate     /etc/letsencrypt/live/api.gradiences.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gradiences.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;

    # CORS headers for API
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;

    location / {
        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass         http://agent_daemon;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        client_max_body_size  4m;
    }
}
