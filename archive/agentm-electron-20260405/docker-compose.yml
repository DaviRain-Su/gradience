version: '3.8'

services:
  # AgentM with A2A Router
  agentm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentm-a2a
    ports:
      - "3939:3939"
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - A2A_ENABLE_NOSTR=true
      - A2A_ENABLE_LIBP2P=true
      - A2A_ENABLE_MAGICBLOCK=true
      - NOSTR_RELAYS=wss://relay.damus.io,wss://relay.nostr.band
      - LIBP2P_BOOTSTRAP=/dns4/bootstrap.libp2p.io/tcp/443/wss/p2p/QmNnooDu7bfjPFoTZYxMNLWUQJyrVwtbZg5gBMjTezGAJN
    volumes:
      - agentm-data:/app/data
    networks:
      - a2a-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3939/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nostr Relay (optional, for testing)
  nostr-relay:
    image: scsibug/nostr-rs-relay:latest
    container_name: nostr-relay
    ports:
      - "8080:8080"
    volumes:
      - nostr-data:/app/data
      - ./nostr-config.toml:/app/config.toml:ro
    networks:
      - a2a-network
    restart: unless-stopped
    profiles:
      - with-relay

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: a2a-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - a2a-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: a2a-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - a2a-network
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  agentm-data:
  nostr-data:
  prometheus-data:
  grafana-data:

networks:
  a2a-network:
    driver: bridge
