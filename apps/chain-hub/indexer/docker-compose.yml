version: '3.8'

services:
    postgres:
        image: postgres:16-alpine
        container_name: gradience-indexer-db
        environment:
            POSTGRES_DB: gradience_indexer
            POSTGRES_USER: gradience
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gradience_dev}
        ports:
            - '${POSTGRES_PORT:-5432}:5432'
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ./migrations:/docker-entrypoint-initdb.d
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U gradience -d gradience_indexer']
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: gradience-indexer-cache
        ports:
            - '${REDIS_PORT:-6379}:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
