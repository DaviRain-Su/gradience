services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gradience
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gradience"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./migrations:/migrations:ro
    command:
      - sh
      - -c
      - |
        psql -h postgres -U postgres -d gradience -v ON_ERROR_STOP=1 -f /migrations/0001_init.sql
        psql -h postgres -U postgres -d gradience -v ON_ERROR_STOP=1 -f /migrations/0002_judge_pool_members.sql
        psql -h postgres -U postgres -d gradience -v ON_ERROR_STOP=1 -f /migrations/0003_tasks_poster_index.sql
    restart: "no"

  indexer:
    build:
      context: ..
      dockerfile: indexer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/gradience
      INDEXER_BIND_ADDR: 0.0.0.0:3001
    ports:
      - "3001:3001"

volumes:
  postgres_data:
