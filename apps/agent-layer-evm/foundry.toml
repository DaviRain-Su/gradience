[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = true
auto_detect_solc = true

[fmt]
line_length = 120
bracket_spacing = true
int_types = "long"
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4

[rpc_endpoints]
xlayer = "https://rpc.xlayer.tech"
xlayer-testnet = "https://testrpc.xlayer.tech"
base = "https://mainnet.base.org"
arbitrum = "https://arb1.arbitrum.io/rpc"
ethereum = "https://eth.llamarpc.com"

[etherscan]
xlayer = { key = "${ETHERSCAN_API_KEY}", url = "https://www.oklink.com/api/v5/explorer/contract/verify-source-code-plugin/XLAYER" }
xlayer-testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://www.oklink.com/api/v5/explorer/contract/verify-source-code-plugin/XLAYER_TESTNET" }
base = { key = "${BASESCAN_API_KEY}" }
arbitrum = { key = "${ARBISCAN_API_KEY}" }
ethereum = { key = "${ETHERSCAN_API_KEY}" }
