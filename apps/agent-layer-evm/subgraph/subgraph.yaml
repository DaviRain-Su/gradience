specVersion: 0.0.4
schema:
    file: ./schema.graphql
dataSources:
    - kind: ethereum
      name: AgentArenaEVM
      network: xlayer-testnet
      source:
          address: '0xd9c087c9e8e0253c7ea315811d751b0586ec9179'
          abi: AgentArenaEVM
          startBlock: 27143120
      mapping:
          kind: ethereum/events
          apiVersion: 0.0.6
          language: wasm/assemblyscript
          entities:
              - Task
              - Application
              - Submission
              - Dispute
              - User
              - ProtocolMetric
              - LLMJudgeOracle
          abis:
              - name: AgentArenaEVM
                file: ./abis/AgentArenaEVM.json
          eventHandlers:
              - event: TaskCreated(indexed uint256,indexed address,indexed address,uint8,uint256,uint256,uint64,uint64,string)
                handler: handleTaskCreated
              - event: TaskApplied(indexed uint256,indexed address,uint256)
                handler: handleTaskApplied
              - event: SubmissionReceived(indexed uint256,indexed address,string,string)
                handler: handleSubmissionReceived
              - event: TaskJudged(indexed uint256,indexed address,uint8,uint256,uint256,uint256)
                handler: handleTaskJudged
              - event: TaskRefunded(indexed uint256,indexed address,uint256,uint8)
                handler: handleTaskRefunded
              - event: StakeRefunded(indexed uint256,indexed address,uint256)
                handler: handleStakeRefunded
              - event: AgentCompensated(indexed uint256,indexed address,uint256)
                handler: handleAgentCompensated
              - event: DisputeOpened(indexed uint256,indexed address,uint256,bytes32)
                handler: handleDisputeOpened
              - event: DisputeResolved(indexed uint256,uint8,indexed address,address,uint8)
                handler: handleDisputeResolved
              - event: JudgeSlashed(indexed uint256,indexed address,uint256,string)
                handler: handleJudgeSlashed
              - event: ProtocolFeesWithdrawn(indexed address,indexed address,uint256)
                handler: handleProtocolFeesWithdrawn
              - event: LLMJudgeSet(indexed address,indexed address)
                handler: handleLLMJudgeSet
              - event: TaskJudgedWithProof(indexed uint256,indexed address,uint8,bytes32)
                handler: handleTaskJudgedWithProof
          file: ./src/mappings/agentArena.ts

    - kind: ethereum
      name: AgentMRegistry
      network: xlayer-testnet
      source:
          address: '0x377acc8a9af86e297fa54af1e148507130dfc040'
          abi: AgentMRegistry
          startBlock: 27143120
      mapping:
          kind: ethereum/events
          apiVersion: 0.0.6
          language: wasm/assemblyscript
          entities:
              - User
              - AgentProfile
          abis:
              - name: AgentMRegistry
                file: ./abis/AgentMRegistry.json
          eventHandlers:
              - event: UserRegistered(indexed address,string,string,uint64)
                handler: handleUserRegistered
              - event: ProfileUpdated(indexed address,string,uint64,string)
                handler: handleProfileUpdated
              - event: AgentCreated(indexed address,indexed uint256,string)
                handler: handleAgentCreated
              - event: AgentUpdated(indexed uint256,string,bool)
                handler: handleAgentUpdated
          file: ./src/mappings/agentMRegistry.ts

    - kind: ethereum
      name: GradienceReputationFeed
      network: xlayer-testnet
      source:
          address: '0x13fed43909e99a2caeae9cd8d4bb37d1b47cbf86'
          abi: GradienceReputationFeed
          startBlock: 27143120
      mapping:
          kind: ethereum/events
          apiVersion: 0.0.6
          language: wasm/assemblyscript
          entities:
              - Reputation
              - User
          abis:
              - name: GradienceReputationFeed
                file: ./abis/GradienceReputationFeed.json
          eventHandlers:
              - event: ReputationUpdated(indexed address,bytes32,uint16,uint64,indexed address)
                handler: handleReputationUpdated
          file: ./src/mappings/reputationFeed.ts

    - kind: ethereum
      name: SocialGraph
      network: xlayer-testnet
      source:
          address: '0xeed4f9da0bca5fee9df72510e5f6f58d04b7f16d'
          abi: SocialGraph
          startBlock: 27143120
      mapping:
          kind: ethereum/events
          apiVersion: 0.0.6
          language: wasm/assemblyscript
          entities:
              - User
              - SocialEdge
          abis:
              - name: SocialGraph
                file: ./abis/SocialGraph.json
          eventHandlers:
              - event: Followed(indexed address,indexed address)
                handler: handleFollowed
              - event: Unfollowed(indexed address,indexed address)
                handler: handleUnfollowed
          file: ./src/mappings/socialGraph.ts

    - kind: ethereum
      name: JudgeRegistry
      network: xlayer-testnet
      source:
          address: '0xbb78f0d62491853e7eb0e722bf0ee957c1b60508'
          abi: JudgeRegistry
          startBlock: 27143120
      mapping:
          kind: ethereum/events
          apiVersion: 0.0.6
          language: wasm/assemblyscript
          entities:
              - JudgeRegistration
              - User
          abis:
              - name: JudgeRegistry
                file: ./abis/JudgeRegistry.json
          eventHandlers:
              - event: JudgeRegistered(indexed address,indexed uint8)
                handler: handleJudgeRegistered
              - event: JudgeUnregistered(indexed address,indexed uint8)
                handler: handleJudgeUnregistered
              - event: JudgeSlashed(indexed address,uint256,string)
                handler: handleJudgeSlashed
          file: ./src/mappings/judgeRegistry.ts
