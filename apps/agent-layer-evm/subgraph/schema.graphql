enum TaskState {
  Open
  Completed
  Refunded
}

enum JudgeMode {
  Designated
  Pool
}

enum DisputeState {
  Open
  Resolved
}

type Task @entity(immutable: false) {
  id: ID!
  taskId: BigInt!
  poster: User!
  judge: User
  winner: User
  category: Int!
  minStake: BigInt!
  reward: BigInt!
  deadline: BigInt!
  judgeDeadline: BigInt!
  evalRef: String!
  paymentToken: Bytes!
  state: TaskState!
  judgeMode: JudgeMode!
  score: Int
  createdAt: BigInt!
  updatedAt: BigInt!
  applications: [Application!]! @derivedFrom(field: "task")
  submissions: [Submission!]! @derivedFrom(field: "task")
  disputes: [Dispute!]! @derivedFrom(field: "task")
  protocolFee: BigInt
  judgeFee: BigInt
  winnerPayout: BigInt
}

type Application @entity(immutable: false) {
  id: ID!
  task: Task!
  agent: User!
  stake: BigInt!
  appliedAt: BigInt!
  submitted: Boolean!
}

type Submission @entity(immutable: false) {
  id: ID!
  task: Task!
  agent: User!
  resultRef: String!
  traceRef: String!
  submittedAt: BigInt!
}

type Dispute @entity(immutable: false) {
  id: ID!
  task: Task!
  challenger: User!
  bond: BigInt!
  reasonHash: Bytes!
  openedAt: BigInt!
  state: DisputeState!
  outcome: Int
  resolver: User
  correctWinner: User
  correctScore: Int
  resolvedAt: BigInt
}

type User @entity(immutable: false) {
  id: ID!
  address: Bytes!
  username: String
  ensName: String
  metadataURI: String
  version: BigInt
  createdAt: BigInt
  updatedAt: BigInt
  tasksPosted: [Task!]! @derivedFrom(field: "poster")
  tasksWon: [Task!]! @derivedFrom(field: "winner")
  applications: [Application!]! @derivedFrom(field: "agent")
  followings: [SocialEdge!]! @derivedFrom(field: "from")
  followers: [SocialEdge!]! @derivedFrom(field: "to")
  reputation: Reputation @derivedFrom(field: "agent")
  agents: [AgentProfile!]! @derivedFrom(field: "owner")
}

type AgentProfile @entity(immutable: false) {
  id: ID!
  owner: User!
  metadataURI: String!
  createdAt: BigInt!
  isActive: Boolean!
  updatedAt: BigInt!
}

type SocialEdge @entity(immutable: false) {
  id: ID!
  from: User!
  to: User!
  createdAt: BigInt!
}

type Reputation @entity(immutable: false) {
  id: ID!
  agent: User!
  globalScore: Int!
  categoryScores: [Int!]!
  lastUpdatedAt: BigInt!
  oracle: Bytes!
  merkleRoot: Bytes
}

type ProtocolMetric @entity(immutable: false) {
  id: ID!
  totalTasks: BigInt!
  totalCompletedTasks: BigInt!
  totalRefundedTasks: BigInt!
  totalDisputes: BigInt!
  totalProtocolFeesETH: BigInt!
  totalProtocolFeesToken: BigInt!
  updatedAt: BigInt!
}

type LLMJudgeOracle @entity(immutable: false) {
  id: ID!
  previousOracle: Bytes
  newOracle: Bytes
  updatedAt: BigInt!
}
