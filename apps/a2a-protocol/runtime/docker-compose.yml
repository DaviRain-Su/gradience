services:
  postgres:
    image: postgres:16-alpine
    profiles:
      - local-db
    environment:
      POSTGRES_DB: ${A2A_RELAY_POSTGRES_DB:-a2a_relay}
      POSTGRES_USER: ${A2A_RELAY_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${A2A_RELAY_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${A2A_RELAY_POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - relay_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${A2A_RELAY_POSTGRES_USER:-postgres} -d ${A2A_RELAY_POSTGRES_DB:-a2a_relay}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  a2a-relay:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      A2A_RELAY_PROFILE: ${A2A_RELAY_PROFILE:-devnet}
      A2A_RELAY_HOST: 0.0.0.0
      A2A_RELAY_PORT: 3400
      A2A_RELAY_STORE_MODE: ${A2A_RELAY_STORE_MODE:-file}
      A2A_RELAY_STORE_FILE: ${A2A_RELAY_STORE_FILE:-/data/relay-state.json}
      A2A_RELAY_POSTGRES_URL: ${A2A_RELAY_POSTGRES_URL:-postgres://postgres@postgres:5432/a2a_relay?sslmode=disable}
      PGPASSWORD: ${A2A_RELAY_POSTGRES_PASSWORD:-postgres}
      A2A_RELAY_AUTH_TOKEN: ${A2A_RELAY_AUTH_TOKEN:-}
      A2A_RELAY_ALERT_INTERVAL_MS: ${A2A_RELAY_ALERT_INTERVAL_MS:-30000}
      A2A_RELAY_ALERT_WEBHOOK_URL: ${A2A_RELAY_ALERT_WEBHOOK_URL:-}
      A2A_RELAY_ALERT_SLACK_WEBHOOK_URL: ${A2A_RELAY_ALERT_SLACK_WEBHOOK_URL:-}
      A2A_RELAY_ALERT_MIN_SEVERITY: ${A2A_RELAY_ALERT_MIN_SEVERITY:-warning}
      A2A_RELAY_ALERT_DISPATCH_COOLDOWN_MS: ${A2A_RELAY_ALERT_DISPATCH_COOLDOWN_MS:-60000}
      A2A_RELAY_ALERT_RETRY_ATTEMPTS: ${A2A_RELAY_ALERT_RETRY_ATTEMPTS:-3}
      A2A_RELAY_ALERT_RETRY_BASE_DELAY_MS: ${A2A_RELAY_ALERT_RETRY_BASE_DELAY_MS:-250}
      A2A_RELAY_ALERT_SIGNING_SECRET: ${A2A_RELAY_ALERT_SIGNING_SECRET:-}
      A2A_RELAY_ALERT_FAILURE_QUEUE_FILE: ${A2A_RELAY_ALERT_FAILURE_QUEUE_FILE:-/data/alert-failures.ndjson}
      A2A_RELAY_ALERT_REPLAY_ON_START: ${A2A_RELAY_ALERT_REPLAY_ON_START:-true}
    ports:
      - "3400:3400"
    volumes:
      - relay_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3400/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  relay_data:
  relay_pg_data:
