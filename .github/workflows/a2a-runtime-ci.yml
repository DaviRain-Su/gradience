name: a2a-runtime-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/a2a-protocol/runtime/**"
      - ".github/workflows/a2a-runtime-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: apps/a2a-protocol/runtime
        run: npm install
      - name: Run tests
        working-directory: apps/a2a-protocol/runtime
        run: npx tsx --test *.test.ts adapters/*.test.ts
