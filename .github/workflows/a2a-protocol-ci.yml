name: a2a-protocol-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/a2a-protocol/**"
      - ".github/workflows/a2a-protocol-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Solana
        uses: solana-developers/solana-setup@v1
        with:
          solana-version: "2.2"

      - name: Build SBF program
        working-directory: apps/a2a-protocol
        run: cargo build-sbf --manifest-path program/Cargo.toml

      - name: Run integration tests
        working-directory: apps/a2a-protocol
        run: cargo test -p a2a-protocol-tests
