name: CI

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Format and lint check
    lint:
        name: Lint & Format Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check Prettier formatting
              run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,md,yaml,yml}"

            - name: Run ESLint
              run: pnpm run lint

    # TypeScript: install + typecheck + build
    build:
        name: Build & Typecheck
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build workspace packages
              run: pnpm --filter '@gradiences/a2a-types' --filter '@gradiences/nostr-adapter' --filter '@gradiences/sdk' --filter '@gradiences/chain-hub-sdk' run build

            - name: Typecheck agentm-web
              run: pnpm --filter @gradiences/agentm-web exec tsc --noEmit

            - name: Typecheck agent-daemon
              run: pnpm --filter @gradiences/agent-daemon exec tsc --noEmit

            - name: Build agentm-web
              run: pnpm --filter @gradiences/agentm-web run build
              env:
                  NEXT_TELEMETRY_DISABLED: 1

    # Frontend tests
    test-frontend:
        name: Frontend Tests
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run agentm-web unit tests
              run: pnpm --filter @gradiences/agentm-web test -- --run

    # Agent Daemon tests
    test-agent-daemon:
        name: Agent Daemon Tests
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run agent-daemon unit tests
              working-directory: apps/agent-daemon
              run: pnpm exec vitest run tests/unit
              env:
                  SKIP_E2E_TESTS: 'true'

    # Rust: cargo check for Solana programs and Rust packages
    rust-check:
        name: Rust Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - name: Install system dependencies
              run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target/
                  key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: cargo-${{ runner.os }}-

            - name: Check Solana programs
              working-directory: programs
              run: cargo check

            - name: Check chain-hub
              working-directory: apps/chain-hub
              run: cargo check

            - name: Check agentm-sdk Rust
              working-directory: packages/agentm-sdk/rust
              run: cargo check

    # Rust: cargo test for all Rust projects
    rust-test:
        name: Rust Test
        runs-on: ubuntu-latest
        needs: rust-check
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target/
                  key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: cargo-${{ runner.os }}-

            - name: Test Solana programs
              working-directory: programs
              run: cargo test

            - name: Test chain-hub
              working-directory: apps/chain-hub
              run: cargo test

            - name: Test agentm-sdk Rust
              working-directory: packages/agentm-sdk/rust
              run: cargo test
