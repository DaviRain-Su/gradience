name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          cd e2e && npm ci
      
      - name: Install Playwright Browsers
        run: cd e2e && npx playwright install --with-deps
      
      - name: Build packages
        run: npm run build
      
      - name: Start services
        run: |
          npm run dev:indexer &
          sleep 10
      
      - name: Run E2E tests
        run: cd e2e && npm test
        env:
          CI: true
          NEXT_PUBLIC_RPC_ENDPOINT: ${{ secrets.DEVNET_RPC }}
          NEXT_PUBLIC_INDEXER_ENDPOINT: http://localhost:3001
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
