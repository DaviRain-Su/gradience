name: chain-hub-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/chain-hub/**"
      - ".github/workflows/chain-hub-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Solana
        uses: solana-developers/solana-setup@v1
        with:
          solana-version: "2.2"

      - name: Build SBF program
        working-directory: apps/chain-hub
        run: cargo build-sbf --manifest-path program/Cargo.toml

      - name: Run integration tests
        working-directory: apps/chain-hub
        run: cargo test
