name: Solana Program Tests

on:
    push:
        branches: [main]
        paths:
            - apps/agent-arena/program/**
            - programs/chain-hub/**
            - programs/agentm-core/**
            - programs/a2a-protocol/**
            - programs/**
            - .github/workflows/test-solana.yml
    pull_request:
        paths:
            - apps/agent-arena/program/**
            - programs/chain-hub/**
            - programs/agentm-core/**
            - programs/a2a-protocol/**
            - programs/**
            - .github/workflows/test-solana.yml
    workflow_dispatch:

# NOTE: This project uses Pinocchio (not Anchor). Programs are built with
# `cargo build-sbf` (part of the Solana SDK) rather than `anchor build`.
# Integration tests use litesvm / solana-banks-client under standard cargo test.

jobs:
    # -------------------------------------------------------
    # agent-arena — Pinocchio program + integration tests
    # -------------------------------------------------------
    test-agent-arena:
        name: agent-arena (Pinocchio)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Solana CLI
              uses: solana-developers/solana-setup@v1
              with:
                  solana-version: '2.2'

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      apps/agent-arena/target
                  key: solana-agent-arena-${{ runner.os }}-${{ hashFiles('apps/agent-arena/Cargo.lock') }}
                  restore-keys: solana-agent-arena-${{ runner.os }}-

            - name: Build SBF program
              working-directory: apps/agent-arena
              run: cargo build-sbf --manifest-path program/Cargo.toml

            - name: Run integration tests
              working-directory: apps/agent-arena
              run: cargo test -p integration-tests

    # -------------------------------------------------------
    # chain-hub — Pinocchio program + integration tests
    # -------------------------------------------------------
    test-chain-hub:
        name: chain-hub (Pinocchio)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Solana CLI
              uses: solana-developers/solana-setup@v1
              with:
                  solana-version: '2.2'

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      programs/target
                  key: solana-chain-hub-${{ runner.os }}-${{ hashFiles('programs/Cargo.lock') }}
                  restore-keys: solana-chain-hub-${{ runner.os }}-

            - name: Build SBF program
              working-directory: programs
              run: cargo build-sbf --manifest-path chain-hub/Cargo.toml

            - name: Run tests
              working-directory: programs
              run: cargo test -p chain-hub

    # -------------------------------------------------------
    # agentm-core — Pinocchio program
    # Located in programs/agentm-core/
    # -------------------------------------------------------
    test-agentm-core:
        name: agentm-core (Pinocchio)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Solana CLI
              uses: solana-developers/solana-setup@v1
              with:
                  solana-version: '2.2'

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      programs/target
                  key: solana-agentm-core-${{ runner.os }}-${{ hashFiles('programs/Cargo.lock') }}
                  restore-keys: solana-agentm-core-${{ runner.os }}-

            - name: Build SBF program
              working-directory: programs
              run: cargo build-sbf --manifest-path agentm-core/Cargo.toml

            - name: Run tests
              working-directory: programs
              run: cargo test -p agentm-core

    # -------------------------------------------------------
    # a2a-protocol — Pinocchio program + integration tests
    # Located in programs/a2a-protocol/
    # -------------------------------------------------------
    test-a2a-protocol:
        name: a2a-protocol (Pinocchio)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Solana CLI
              uses: solana-developers/solana-setup@v1
              with:
                  solana-version: '2.2'

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      programs/target
                  key: solana-a2a-${{ runner.os }}-${{ hashFiles('programs/Cargo.lock') }}
                  restore-keys: solana-a2a-${{ runner.os }}-

            - name: Build SBF program
              working-directory: programs
              run: cargo build-sbf --manifest-path a2a-protocol/Cargo.toml

            - name: Run tests
              working-directory: programs
              run: cargo test -p a2a-protocol
