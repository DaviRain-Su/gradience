name: Solana Program Tests

on:
    push:
        branches: [main]
        paths:
            - apps/agent-arena/program/**
            - apps/chain-hub/program/**
            - apps/agentm-core/program/**
            - apps/a2a-protocol/program/**
            - programs/**
            - .github/workflows/test-solana.yml
    pull_request:
        paths:
            - apps/agent-arena/program/**
            - apps/chain-hub/program/**
            - apps/agentm-core/program/**
            - apps/a2a-protocol/program/**
            - programs/**
            - .github/workflows/test-solana.yml
    workflow_dispatch:

# NOTE: This project uses Pinocchio (not Anchor). Programs are built with
# `cargo build-sbf` (part of the Solana SDK) rather than `anchor build`.
# Integration tests use litesvm / solana-banks-client under standard cargo test.

jobs:
    # -------------------------------------------------------
    # agent-arena — Pinocchio program + integration tests
    # -------------------------------------------------------
    test-agent-arena:
        name: agent-arena (Pinocchio)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Solana CLI
              uses: solana-developers/solana-setup@v1
              with:
                  solana-version: '2.2'

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      apps/agent-arena/target
                  key: solana-agent-arena-${{ runner.os }}-${{ hashFiles('apps/agent-arena/Cargo.lock') }}
                  restore-keys: solana-agent-arena-${{ runner.os }}-

            - name: Build SBF program
              working-directory: apps/agent-arena
              run: cargo build-sbf --manifest-path program/Cargo.toml

            - name: Run integration tests
              working-directory: apps/agent-arena
              run: cargo test -p integration-tests

    # -------------------------------------------------------
    # chain-hub — Pinocchio program + integration tests
    # -------------------------------------------------------
    test-chain-hub:
        name: chain-hub (Pinocchio)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Solana CLI
              uses: solana-developers/solana-setup@v1
              with:
                  solana-version: '2.2'

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      apps/chain-hub/target
                  key: solana-chain-hub-${{ runner.os }}-${{ hashFiles('apps/chain-hub/Cargo.lock') }}
                  restore-keys: solana-chain-hub-${{ runner.os }}-

            - name: Build SBF program
              working-directory: apps/chain-hub
              run: cargo build-sbf --manifest-path program/Cargo.toml

            - name: Run integration tests
              working-directory: apps/chain-hub
              run: cargo test

    # -------------------------------------------------------
    # agentm-core — Pinocchio program
    # No root workspace Cargo.toml; program/ is standalone.
    # -------------------------------------------------------
    test-agentm-core:
        name: agentm-core (Pinocchio)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Solana CLI
              uses: solana-developers/solana-setup@v1
              with:
                  solana-version: '2.2'

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      apps/agentm-core/program/target
                  key: solana-agentm-core-${{ runner.os }}-${{ hashFiles('apps/agentm-core/program/Cargo.lock') }}
                  restore-keys: solana-agentm-core-${{ runner.os }}-

            - name: Build SBF program
              working-directory: apps/agentm-core/program
              run: cargo build-sbf

            - name: Run tests
              working-directory: apps/agentm-core/program
              run: cargo test

    # -------------------------------------------------------
    # a2a-protocol — Pinocchio program + integration tests
    # -------------------------------------------------------
    test-a2a-protocol:
        name: a2a-protocol (Pinocchio)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Solana CLI
              uses: solana-developers/solana-setup@v1
              with:
                  solana-version: '2.2'

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      apps/a2a-protocol/target
                  key: solana-a2a-${{ runner.os }}-${{ hashFiles('apps/a2a-protocol/Cargo.lock') }}
                  restore-keys: solana-a2a-${{ runner.os }}-

            - name: Build SBF program
              working-directory: apps/a2a-protocol
              run: cargo build-sbf --manifest-path program/Cargo.toml

            - name: Run integration tests
              working-directory: apps/a2a-protocol
              run: cargo test -p a2a-protocol-tests
