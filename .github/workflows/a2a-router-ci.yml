name: A2A Router CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/agentm/src/main/a2a-router/**'
      - 'apps/agentm/src/shared/a2a-router-types.ts'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/agentm/src/main/a2a-router/**'
      - 'apps/agentm/src/shared/a2a-router-types.ts'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agentm

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - uses: actions/cache@v3
      name: Setup pnpm cache
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install

    - name: Type check
      run: pnpm typecheck

    - name: Run unit tests
      run: npx tsx --test src/main/a2a-router/**/*.test.ts

    - name: Run integration tests
      run: npx tsx --test src/main/a2a-router/integration.test.ts

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./apps/agentm
        push: false
        tags: agentm-a2a:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run -d -p 3939:3939 --name test-agentm agentm-a2a:test
        sleep 10
        curl -f http://localhost:3939/health || exit 1
        docker stop test-agentm
