name: agent-arena-ops-alert-gate

on:
  workflow_dispatch:
    inputs:
      indexer_health_url:
        description: "Indexer /healthz URL"
        required: true
        default: "http://127.0.0.1:8787/healthz"
        type: string
      indexer_metrics_url:
        description: "Indexer /metrics URL"
        required: true
        default: "http://127.0.0.1:8787/metrics"
        type: string
      judge_health_url:
        description: "Judge daemon /healthz URL"
        required: true
        default: "http://127.0.0.1:9797/healthz"
        type: string
      judge_metrics_url:
        description: "Judge daemon /metrics URL"
        required: true
        default: "http://127.0.0.1:9797/metrics"
        type: string
      max_pending_workflows:
        description: "Pending workflow alert threshold"
        required: true
        default: "200"
        type: string
      max_source_errors:
        description: "Source error alert threshold"
        required: true
        default: "5"
        type: string
      max_event_staleness_seconds:
        description: "Max event staleness before alert"
        required: true
        default: "1800"
        type: string
      require_event_activity:
        description: "Require non-zero recent event timestamps"
        required: true
        default: false
        type: boolean

jobs:
  alert-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm --dir apps/agent-arena install --frozen-lockfile

      - name: Run observability alert gate
        env:
          INDEXER_HEALTH_URL: ${{ inputs.indexer_health_url }}
          INDEXER_METRICS_URL: ${{ inputs.indexer_metrics_url }}
          JUDGE_DAEMON_HEALTH_URL: ${{ inputs.judge_health_url }}
          JUDGE_DAEMON_METRICS_URL: ${{ inputs.judge_metrics_url }}
          ALERT_MAX_PENDING_WORKFLOWS: ${{ inputs.max_pending_workflows }}
          ALERT_MAX_SOURCE_ERRORS: ${{ inputs.max_source_errors }}
          ALERT_MAX_EVENT_STALENESS_SECONDS: ${{ inputs.max_event_staleness_seconds }}
          ALERT_REQUIRE_EVENT_ACTIVITY: ${{ inputs.require_event_activity }}
        run: pnpm --dir apps/agent-arena ops:alert-gate
