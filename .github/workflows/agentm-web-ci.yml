name: agentm-web-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/agentm-web/**"
      - ".github/workflows/agentm-web-ci.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm --prefix ./apps/agentm-web install

      - name: Run tests
        run: npm --prefix ./apps/agentm-web test

      - name: Build
        run: npm --prefix ./apps/agentm-web run build

      - name: Check dist size
        run: |
          SIZE=$(find ./apps/agentm-web/dist -type f -exec cat {} + | wc -c)
          echo "Dist size: $((SIZE / 1024 / 1024)) MB"
          if [ "$SIZE" -gt 20971520 ]; then
            echo "ERROR: dist exceeds 20MB"
            exit 1
          fi
