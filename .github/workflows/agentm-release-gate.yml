name: agentm-release-gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/agentm/**"
      - ".github/workflows/agentm-release-gate.yml"

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm --dir ./apps/agentm install

      - name: Run Agent.im release gate
        run: pnpm --dir ./apps/agentm release:gate
