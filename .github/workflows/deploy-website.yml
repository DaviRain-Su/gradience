name: Deploy Website to Vercel

on:
    push:
        branches:
            - main
        paths:
            - 'website/**'
            - 'packages/**'
            - '.github/workflows/deploy-website.yml'
            - 'pnpm-lock.yaml'
    pull_request:
        branches:
            - main
        paths:
            - 'website/**'
            - 'packages/**'
            - '.github/workflows/deploy-website.yml'
            - 'pnpm-lock.yaml'

env:
    VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEBSITE }}

concurrency:
    group: deploy-website-${{ github.ref }}
    cancel-in-progress: false

jobs:
    deploy-preview:
        name: Deploy Preview
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Install Vercel CLI
              run: pnpm add -g vercel@latest

            - name: Pull Vercel Environment Information
              run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
              working-directory: website

            - name: Build Project Artifacts
              run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
              working-directory: website

            - name: Deploy Preview to Vercel
              id: deploy
              run: |
                  DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
                  echo "preview_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
              working-directory: website

            - name: Comment Preview URL
              uses: actions/github-script@v7
              with:
                  script: |
                      const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
                      const message = `🚀 **Preview Deployment Ready**\n\n🔗 ${previewUrl}`;

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: message
                      });

    deploy-production:
        name: Deploy Production
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        environment:
            name: production
            url: https://gradiences.xyz
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Install Vercel CLI
              run: pnpm add -g vercel@latest

            - name: Pull Vercel Environment Information
              run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
              working-directory: website

            - name: Build Project Artifacts
              run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
              working-directory: website

            - name: Deploy to Production
              run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
              working-directory: website

            - name: Notify Deployment Success
              uses: actions/github-script@v7
              if: success()
              with:
                  script: |
                      const sha = context.sha.substring(0, 7);
                      const message = `✅ **Production Deployment Successful**\n\n- Commit: \`${sha}\`\n- URL: https://gradiences.xyz`;

                      github.rest.repos.createCommitComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        commit_sha: context.sha,
                        body: message
                      });

    smoke-test:
        name: Smoke Test Production
        runs-on: ubuntu-latest
        needs: deploy-production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - name: Wait for deployment
              run: sleep 30

            - name: Test homepage
              run: |
                  curl -sf https://gradiences.xyz > /dev/null && echo "✅ Homepage OK" || exit 1

            - name: Test API endpoint
              run: |
                  curl -sf https://gradiences.xyz/api/subscribe?action=count > /dev/null && echo "✅ API OK" || exit 1

            - name: Notify on failure
              if: failure()
              uses: actions/github-script@v7
              with:
                  script: |
                      github.rest.repos.createCommitComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        commit_sha: context.sha,
                        body: '❌ **Smoke Test Failed** - Production deployment may have issues'
                      });
