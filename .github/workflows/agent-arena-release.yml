name: agent-arena-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (must match workspace/npm/rust versions)"
        required: true
        type: string
      dry_run:
        description: "Run publish steps in dry-run mode"
        required: true
        default: true
        type: boolean
      publish_npm:
        description: "Publish @gradience/sdk to npm"
        required: true
        default: true
        type: boolean
      publish_crates:
        description: "Publish pinocchio-counter-client to crates.io"
        required: true
        default: true
        type: boolean
      npm_tag:
        description: "npm dist-tag"
        required: false
        default: "latest"
        type: string

concurrency:
  group: agent-arena-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm --dir apps/agent-arena install --frozen-lockfile

      - name: Validate release version convention
        run: pnpm --dir apps/agent-arena release:check-version -- --version "${{ inputs.version }}"

      - name: SDK tests
        run: pnpm --dir apps/agent-arena test:sdk

      - name: Build SDK
        run: pnpm --dir apps/agent-arena/clients/typescript run build

  publish-npm:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ inputs.publish_npm }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm --dir apps/agent-arena install --frozen-lockfile

      - name: Publish npm package
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --dir apps/agent-arena release:sdk

  publish-crates:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ inputs.publish_crates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm --dir apps/agent-arena install --frozen-lockfile

      - name: Publish rust client crate
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: pnpm --dir apps/agent-arena release:rust-client
